<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippogotchi - Mi Compañero</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { 
                        'app-bg': '#E6F0FA', // Un fondo un poco más suave y relajante
                        'panel-bg': '#F4F9FF', // Blanco roto azulado para máxima paz
                        'btn-blue': '#1D5A9E', // Azul con un tono un poco más amable
                        'btn-orange': '#FFA33A'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-app-bg min-h-screen p-8 flex flex-col items-center text-gray-700">

    <div id="pantalla-dashboard" class="w-full max-w-7xl grid grid-cols-12 gap-8 relative">

        <div class="col-span-4 flex flex-col gap-6">
            
            <div class="bg-panel-bg rounded-[2.5rem] p-8 shadow-sm flex flex-col items-center border border-white">
                <h1 class="text-3xl font-extrabold text-btn-blue mb-6 tracking-tight">Hippogotchi</h1>
                <div id="hippo-emoji" class="text-9xl mb-8 transition-all duration-300 drop-shadow-sm">🦛</div>

                <div class="w-full space-y-5 mb-10">
                    <div class="flex items-center gap-4">
                        <span class="text-2xl">💧</span>
                        <div class="flex-1 bg-blue-100 rounded-full h-4 shadow-inner overflow-hidden">
                            <div id="bar-sed" class="bg-blue-400 h-full rounded-full transition-all duration-500" style="width: 80%"></div>
                        </div>
                        <button id="btn-beber" onclick="doAction('sed', 20, 'Vaso de agua')" class="bg-btn-blue text-white text-xs px-5 py-2 rounded-full font-bold w-24 hover:bg-blue-700 hover:shadow-md transition-all disabled:opacity-40 disabled:cursor-not-allowed">Beber</button>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-2xl">🌻</span>
                        <div class="flex-1 bg-yellow-100 rounded-full h-4 shadow-inner overflow-hidden">
                            <div id="bar-descanso" class="bg-yellow-400 h-full rounded-full transition-all duration-500" style="width: 60%"></div>
                        </div>
                        <button id="btn-respirar" onclick="doAction('descanso', 25, 'Respiración')" class="bg-btn-blue text-white text-xs px-5 py-2 rounded-full font-bold w-24 hover:bg-blue-700 hover:shadow-md transition-all disabled:opacity-40 disabled:cursor-not-allowed">Respirar</button>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-2xl">🍎</span>
                        <div class="flex-1 bg-red-100 rounded-full h-4 shadow-inner overflow-hidden">
                            <div id="bar-hambre" class="bg-red-400 h-full rounded-full transition-all duration-500" style="width: 70%"></div>
                        </div>
                        <button id="btn-comer" onclick="doAction('hambre', 30, 'Comida sana')" class="bg-btn-blue text-white text-xs px-5 py-2 rounded-full font-bold w-24 hover:bg-blue-700 hover:shadow-md transition-all disabled:opacity-40 disabled:cursor-not-allowed">Comer</button>
                    </div>
                </div>

                <div class="flex justify-between w-full px-4 mt-auto">
                    <div class="flex flex-col items-center gap-3">
                        <div class="relative w-8 h-28 bg-orange-50 rounded-full shadow-inner overflow-hidden">
                            <div id="bar-motivacion" class="absolute bottom-0 w-full bg-orange-300 rounded-full transition-all duration-500" style="height: 50%"></div>
                        </div>
                        <span class="text-xs text-gray-500 font-semibold tracking-widest" style="writing-mode: vertical-rl; transform: rotate(180deg);">Motivación</span>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <div class="relative w-8 h-28 bg-teal-50 rounded-full shadow-inner overflow-hidden">
                            <div id="bar-calma" class="absolute bottom-0 w-full bg-teal-300 rounded-full transition-all duration-500" style="height: 50%"></div>
                        </div>
                        <span class="text-xs text-gray-500 font-semibold tracking-widest" style="writing-mode: vertical-rl; transform: rotate(180deg);">Calma</span>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <div class="relative w-8 h-28 bg-red-50 rounded-full shadow-inner overflow-hidden">
                            <div id="bar-fuerza" class="absolute bottom-0 w-full bg-red-300 rounded-full transition-all duration-500" style="height: 50%"></div>
                        </div>
                        <span class="text-xs text-gray-500 font-semibold tracking-widest" style="writing-mode: vertical-rl; transform: rotate(180deg);">Fuerza</span>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <div class="relative w-8 h-28 bg-purple-50 rounded-full shadow-inner overflow-hidden">
                            <div id="bar-realizacion" class="absolute bottom-0 w-full bg-purple-300 rounded-full transition-all duration-500" style="height: 50%"></div>
                        </div>
                        <span class="text-xs text-gray-500 font-semibold tracking-widest" style="writing-mode: vertical-rl; transform: rotate(180deg);">Realización</span>
                    </div>
                </div>
            </div>

            <button class="bg-white text-btn-blue border-2 border-btn-blue rounded-full py-3.5 font-bold shadow-sm hover:bg-blue-50 transition-colors">
                ¿Cómo estás?
            </button>
        </div>

        <div class="col-span-8 flex flex-col gap-6">
            
            <div class="bg-panel-bg rounded-[2.5rem] p-8 shadow-sm flex flex-col flex-1 border border-white">
                
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-700">Mis tareas</h2>
                    <div class="bg-blue-100/50 p-1.5 rounded-full flex gap-1">
                        <button class="text-gray-500 px-6 py-2 rounded-full text-sm font-semibold hover:text-gray-700 transition">Calendario</button>
                        <button class="bg-white text-btn-blue shadow-sm px-6 py-2 rounded-full text-sm font-bold">Lista</button>
                    </div>
                </div>

               <div class="w-full flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-gray-400 text-sm border-b-2 border-blue-100">
                                <th class="pb-3 font-medium pl-2 w-2/5">Tarea</th>
                                <th class="pb-3 font-medium text-center">Prioridad</th>
                                <th class="pb-3 font-medium text-center">Fecha límite</th>
                                <th class="pb-3 font-medium text-center">Categoría</th>
                                <th class="pb-3 font-medium text-center">Hecha</th>
                            </tr>
                        </thead>
                        <tbody id="task-list-body" class="text-sm">
                        </tbody>
                    </table>
                </div>

                <div class="mt-6 bg-white rounded-full p-2 pl-6 shadow-[0_4px_20px_-5px_rgba(0,0,0,0.05)] border border-blue-50 flex items-center gap-3">
                    <input id="input-task-name" type="text" placeholder="Escribe una nueva tarea..." class="flex-1 bg-transparent text-gray-600 outline-none text-sm placeholder-gray-400">
                    
                    <div class="h-6 w-px bg-gray-200"></div>
                    
                    <select id="input-task-prio" class="bg-transparent text-sm text-gray-500 outline-none cursor-pointer pr-2">
                        <option value="alta">🔴 Alta</option>
                        <option value="media" selected>🟡 Media</option>
                        <option value="baja">🟢 Baja</option>
                    </select>
                    
                    <div class="h-6 w-px bg-gray-200"></div>
                    
                    <input id="input-task-date" type="datetime-local" class="bg-transparent text-sm text-gray-500 outline-none">
                    
                    <div class="h-6 w-px bg-gray-200"></div>
                    
                    <select id="input-task-cat" class="bg-transparent text-sm text-gray-500 outline-none cursor-pointer pr-2">
                        <option value="motivacion">Motivación</option>
                        <option value="calma">Calma</option>
                        <option value="fuerza">Fuerza</option>
                        <option value="realizacion">Realización</option>
                    </select>

                    <button onclick="addTask()" class="bg-btn-blue text-white px-6 py-2.5 rounded-full font-bold hover:bg-blue-800 transition shadow-sm text-sm">
                        Añadir
                    </button>
                </div>
                </div>

            <button class="bg-btn-blue text-white px-10 py-3.5 rounded-full font-bold shadow-md hover:bg-blue-800 transition-colors self-start">
                Iniciar Pomodoro ⏱️
            </button>
        </div>
    </div>

    <script>
        // --- 1. SINTETIZADOR DE AUDIO (Web Audio API) ---
        // Generamos sonidos matemáticamente para no depender de archivos externos
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'click') {
                // Sonido corto y grave (bloop)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'success') {
                // Sonido agudo y alegre (ding!)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1); // Sube el tono
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- 2. EL ESTADO GLOBAL ---
        let hippoState = {
            basicas: { sed: 80, hambre: 70, descanso: 60 },
            desarrollo: { motivacion: 50, calma: 50, fuerza: 50, realizacion: 50 },
            historial: [], 
            tareasPendientes: [], // NUEVO: Array para guardar las tareas de la tabla
            ui: { vistaActiva: 'lista', pantallaActiva: 'dashboard' } 
        };

        // --- 3. LÓGICA DE TAREAS ---
        
        // Poner la fecha de "hoy" por defecto en el input
        function setDefaultDateTime() {
            const now = new Date();
            // Formatear a YYYY-MM-DDThh:mm (Requerido por datetime-local)
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('input-task-date').value = now.toISOString().slice(0, 16);
        }

        function addTask() {
            const nameInput = document.getElementById('input-task-name');
            const prioInput = document.getElementById('input-task-prio');
            const dateInput = document.getElementById('input-task-date');
            const catInput = document.getElementById('input-task-cat');

            // Condición: Que haya texto
            if (nameInput.value.trim() !== "") {
                
                // Creamos el objeto de la tarea
                const nuevaTarea = {
                    id: Date.now(), // Un ID único basado en el milisegundo actual
                    nombre: nameInput.value.trim(),
                    prioridad: prioInput.value,
                    fechaStr: new Date(dateInput.value).toLocaleString('es-ES', { day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit' }),
                    categoria: catInput.value
                };

                // Añadimos al cerebro
                hippoState.tareasPendientes.push(nuevaTarea);
                
                // Efectos visuales y sonoros
                playSound('click');
                nameInput.value = ""; // Limpiamos el texto
                renderTasks(); // Repintamos la tabla
            }
        }

        function completeTask(taskId, categoria) {
            playSound('success'); // ¡Ding!
            
            // 1. Encontrar la tarea y sacarla de pendientes
            const index = hippoState.tareasPendientes.findIndex(t => t.id === taskId);
            if (index !== -1) {
                const tareaCompletada = hippoState.tareasPendientes[index];
                hippoState.tareasPendientes.splice(index, 1); // La borramos de la tabla
                
                // 2. Moverla al historial
                hippoState.historial.push({
                    accion: `Completado: ${tareaCompletada.nombre}`,
                    fecha: new Date().toLocaleString()
                });

                // 3. Subir la estadística correspondiente al Hipopótamo (+15%)
                hippoState.desarrollo[categoria] = Math.min(100, hippoState.desarrollo[categoria] + 15);
                
                // 4. Actualizar toda la interfaz
                renderTasks();
                renderUI();
            }
        }

        // --- 4. RENDERIZADO BÁSICO ---
        function doAction(stat, cantidad, nombreAccion) {
            if (hippoState.basicas[stat] < 100) {
                playSound('click');
                hippoState.basicas[stat] = Math.min(100, hippoState.basicas[stat] + cantidad);
                hippoState.historial.push({ accion: nombreAccion, fecha: new Date().toLocaleString() });
                renderUI();
            }
        }

        function renderTasks() {
            const tbody = document.getElementById('task-list-body');
            tbody.innerHTML = ''; // Vaciamos la tabla HTML

            // Diccionario para las banderas
            const badges = {
                'alta': '<span class="bg-red-50 text-red-600 px-3 py-1 rounded-full text-xs font-bold shadow-sm">🔴 Alta</span>',
                'media': '<span class="bg-yellow-50 text-yellow-600 px-3 py-1 rounded-full text-xs font-bold shadow-sm">🟡 Media</span>',
                'baja': '<span class="bg-green-50 text-green-600 px-3 py-1 rounded-full text-xs font-bold shadow-sm">🟢 Baja</span>'
            };

            // Reconstruimos la tabla leyendo el array
            hippoState.tareasPendientes.forEach(tarea => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-blue-50 hover:bg-blue-50/50 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 pl-2 font-medium text-gray-600 text-base">${tarea.nombre}</td>
                    <td class="py-4 text-center">${badges[tarea.prioridad]}</td>
                    <td class="py-4 text-gray-500 text-center">${tarea.fechaStr}</td>
                    <td class="py-4 text-gray-500 text-center capitalize">${tarea.categoria}</td>
                    <td class="py-4 text-center">
                        <input type="checkbox" onchange="completeTask(${tarea.id}, '${tarea.categoria}')" class="w-5 h-5 accent-btn-blue cursor-pointer">
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderUI() {
            document.getElementById('bar-sed').style.width = hippoState.basicas.sed + '%';
            document.getElementById('bar-descanso').style.width = hippoState.basicas.descanso + '%';
            document.getElementById('bar-hambre').style.width = hippoState.basicas.hambre + '%';

            document.getElementById('bar-motivacion').style.height = hippoState.desarrollo.motivacion + '%';
            document.getElementById('bar-calma').style.height = hippoState.desarrollo.calma + '%';
            document.getElementById('bar-fuerza').style.height = hippoState.desarrollo.fuerza + '%';
            document.getElementById('bar-realizacion').style.height = hippoState.desarrollo.realizacion + '%';

            document.getElementById('btn-beber').disabled = (hippoState.basicas.sed >= 100);
            document.getElementById('btn-respirar').disabled = (hippoState.basicas.descanso >= 100);
            document.getElementById('btn-comer').disabled = (hippoState.basicas.hambre >= 100);
        }

        // Inicialización de la aplicación
        setDefaultDateTime();
        renderTasks(); // Renderizará vacío al principio
        renderUI();
    </script>
</body>
</html>
