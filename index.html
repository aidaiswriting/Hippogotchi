<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippogotchi - Mi Compañero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { 'app-bg': '#D2E3F3', 'panel-bg': '#EEF5FC', 'btn-blue': '#104A8E' }
                }
            }
        }
    </script>
</head>
<body class="bg-app-bg min-h-screen p-4 md:p-8 flex justify-center items-center">

    <div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-12 gap-6">

        <div class="col-span-1 md:col-span-4 bg-panel-bg rounded-[2rem] p-6 shadow-sm flex flex-col items-center">
            <h1 class="text-3xl font-extrabold text-gray-700 mb-6 border-b-2 border-red-300 pb-1">Hippogotchi</h1>
            <div id="hippo-emoji" class="text-8xl mb-6 transition-all duration-300">🦛</div>

            <div class="w-full space-y-4 mb-8">
                <div class="flex items-center gap-3">
                    <span class="text-xl">💧</span>
                    <div class="flex-1 bg-white rounded-full h-4 shadow-inner overflow-hidden">
                        <div id="bar-sed" class="bg-blue-400 h-full rounded-full transition-all duration-500" style="width: 100%"></div>
                    </div>
                    <button onclick="updateStat('basicas', 'sed', 20)" class="bg-btn-blue text-white text-xs px-4 py-1.5 rounded-full hover:opacity-90 transition font-semibold w-20">Beber</button>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xl">🌻</span>
                    <div class="flex-1 bg-white rounded-full h-4 shadow-inner overflow-hidden">
                        <div id="bar-descanso" class="bg-yellow-400 h-full rounded-full transition-all duration-500" style="width: 100%"></div>
                    </div>
                    <button onclick="updateStat('basicas', 'descanso', 25)" class="bg-btn-blue text-white text-xs px-4 py-1.5 rounded-full hover:opacity-90 transition font-semibold w-20">Respirar</button>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xl">🍎</span>
                    <div class="flex-1 bg-white rounded-full h-4 shadow-inner overflow-hidden">
                        <div id="bar-hambre" class="bg-red-400 h-full rounded-full transition-all duration-500" style="width: 100%"></div>
                    </div>
                    <button onclick="updateStat('basicas', 'hambre', 30)" class="bg-btn-blue text-white text-xs px-4 py-1.5 rounded-full hover:opacity-90 transition font-semibold w-20">Comer</button>
                </div>
            </div>

            <div class="flex justify-between w-full px-2 mt-auto">
                <div class="flex flex-col items-center gap-3">
                    <div class="relative w-8 h-24 bg-white rounded-full shadow-inner overflow-hidden border border-gray-200">
                        <div id="bar-motivacion" class="absolute bottom-0 w-full bg-orange-300 rounded-full transition-all duration-500" style="height: 50%"></div>
                    </div>
                    <span class="text-xs text-gray-600 font-semibold" style="writing-mode: vertical-rl; transform: rotate(180deg);">Motivación</span>
                </div>
                <div class="flex flex-col items-center gap-3">
                    <div class="relative w-8 h-24 bg-white rounded-full shadow-inner overflow-hidden border border-gray-200">
                        <div id="bar-calma" class="absolute bottom-0 w-full bg-teal-300 rounded-full transition-all duration-500" style="height: 50%"></div>
                    </div>
                    <span class="text-xs text-gray-600 font-semibold" style="writing-mode: vertical-rl; transform: rotate(180deg);">Calma</span>
                </div>
                <div class="flex flex-col items-center gap-3">
                    <div class="relative w-8 h-24 bg-white rounded-full shadow-inner overflow-hidden border border-gray-200">
                        <div id="bar-fuerza" class="absolute bottom-0 w-full bg-red-300 rounded-full transition-all duration-500" style="height: 50%"></div>
                    </div>
                    <span class="text-xs text-gray-600 font-semibold" style="writing-mode: vertical-rl; transform: rotate(180deg);">Fuerza</span>
                </div>
                <div class="flex flex-col items-center gap-3">
                    <div class="relative w-8 h-24 bg-white rounded-full shadow-inner overflow-hidden border border-gray-200">
                        <div id="bar-realizacion" class="absolute bottom-0 w-full bg-purple-300 rounded-full transition-all duration-500" style="height: 50%"></div>
                    </div>
                    <span class="text-xs text-gray-600 font-semibold" style="writing-mode: vertical-rl; transform: rotate(180deg);">Realización</span>
                </div>
            </div>
        </div>

        <div class="col-span-1 md:col-span-8 flex flex-col gap-4">
            
            <div class="bg-panel-bg rounded-[2rem] p-8 shadow-sm flex-1 min-h-[400px] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-600">Mis tareas</h2>
                    <div class="flex gap-2">
                        <button class="bg-btn-blue text-white px-5 py-1.5 rounded-full text-sm font-semibold hover:opacity-90 transition">Calendario</button>
                        <button class="bg-btn-blue text-white px-5 py-1.5 rounded-full text-sm font-semibold hover:opacity-90 transition">Lista</button>
                    </div>
                </div>

                <div class="bg-white rounded-xl overflow-hidden border border-gray-200 flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-gray-500 text-sm">
                                <th class="p-4 font-semibold">Tarea</th>
                                <th class="p-4 font-semibold border-l border-gray-200">Categoría</th>
                                <th class="p-4 font-semibold border-l border-gray-200">Fecha/Hora</th>
                                <th class="p-4 font-semibold border-l border-gray-200 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="task-table-body">
                            <tr id="task-1" class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="p-4 text-gray-700 font-medium line-through-target">Estirar 10 min</td>
                                <td class="p-4 text-orange-500 border-l border-gray-200 font-medium">Fuerza</td>
                                <td class="p-4 text-gray-500 border-l border-gray-200">Hoy, 12:30</td>
                                <td class="p-4 border-l border-gray-200 text-center">
                                    <input type="checkbox" onchange="completeTask('task-1', 'desarrollo', 'fuerza', 15)" class="w-5 h-5 accent-btn-blue cursor-pointer">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-panel-bg rounded-full p-2 pl-6 shadow-sm">
                <div class="flex flex-col md:flex-row gap-3 items-center justify-between text-sm">
                    <input id="new-task-name" type="text" placeholder="Nombre de la tarea" class="bg-white px-4 py-2.5 rounded-full outline-none w-full flex-1">
                    <select id="new-task-category" class="bg-white px-4 py-2.5 rounded-full w-full md:w-40 text-gray-500 outline-none cursor-pointer">
                        <option value="" disabled selected>Categoría...</option>
                        <option value="motivacion">Motivación</option>
                        <option value="calma">Calma</option>
                        <option value="fuerza">Fuerza</option>
                        <option value="realizacion">Realización</option>
                    </select>
                    <input id="new-task-time" type="datetime-local" class="bg-white px-4 py-2.5 rounded-full outline-none w-full md:w-auto text-gray-500">
                    <button class="bg-btn-blue text-white px-6 py-2.5 rounded-full font-bold hover:opacity-90 transition whitespace-nowrap">
                        + Añadir
                    </button>
                </div>
            </div>

            <div class="bg-panel-bg rounded-full p-3 shadow-sm text-center text-sm text-gray-400 font-medium">
                Barra de pestañas para uso futuro
            </div>
        </div>
    </div>

    <script>
        // 1. Estado Global
        let hippoState = {
            basicas: { sed: 100, hambre: 100, descanso: 100 },
            desarrollo: { motivacion: 50, calma: 50, fuerza: 50, realizacion: 50 }
        };

        // 2. Configuración (Tasas de caída)
        const DROP_RATES = {
            sed: 100 / 120,    
            hambre: 100 / 480, 
            descanso: 100 / 50 
        };

        // 3. Modificar Estado (Accionada por botones)
        function updateStat(categoria, stat, cantidad) {
            hippoState[categoria][stat] = Math.min(100, hippoState[categoria][stat] + cantidad);
            renderUI();
        }

        // 4. Lógica de Tareas Checkbox
        function completeTask(taskId, categoria, stat, cantidad) {
            // Buscamos la fila de la tarea
            const row = document.getElementById(taskId);
            const textElement = row.querySelector('.line-through-target');
            const checkbox = row.querySelector('input[type="checkbox"]');
            
            if (checkbox.checked) {
                // Tachamos el texto
                textElement.classList.add('line-through', 'text-gray-400');
                // Premiamos al hipopótamo
                updateStat(categoria, stat, cantidad);
            } else {
                // Destachamos si el usuario se equivoca
                textElement.classList.remove('line-through', 'text-gray-400');
                // Le quitamos los puntos
                hippoState[categoria][stat] = Math.max(0, hippoState[categoria][stat] - cantidad);
                renderUI();
            }
        }

        // 5. Renderizar Interfaz (Actualiza anchos y altos del HTML)
        function renderUI() {
            // Barras horizontales (Cambiamos el width)
            document.getElementById('bar-sed').style.width = hippoState.basicas.sed + '%';
            document.getElementById('bar-descanso').style.width = hippoState.basicas.descanso + '%';
            document.getElementById('bar-hambre').style.width = hippoState.basicas.hambre + '%';
            
            // Barras verticales (Cambiamos el height)
            document.getElementById('bar-motivacion').style.height = hippoState.desarrollo.motivacion + '%';
            document.getElementById('bar-calma').style.height = hippoState.desarrollo.calma + '%';
            document.getElementById('bar-fuerza').style.height = hippoState.desarrollo.fuerza + '%';
            document.getElementById('bar-realizacion').style.height = hippoState.desarrollo.realizacion + '%';

            // Efecto visual si el hipo tiene sed o hambre grave (menos del 20%)
            const hippoEmoji = document.getElementById('hippo-emoji');
            if (hippoState.basicas.sed < 20 || hippoState.basicas.hambre < 20) {
                hippoEmoji.innerText = "😫";
            } else {
                hippoEmoji.innerText = "🦛";
            }
        }

        // 6. El Bucle de Vida (Game Loop)
        setInterval(() => {
            hippoState.basicas.sed = Math.max(0, hippoState.basicas.sed - DROP_RATES.sed);
            hippoState.basicas.hambre = Math.max(0, hippoState.basicas.hambre - DROP_RATES.hambre);
            hippoState.basicas.descanso = Math.max(0, hippoState.basicas.descanso - DROP_RATES.descanso);
            
            renderUI();
        }, 60000); // Se actualiza cada 1 minuto (60000 ms)

        // Inicializamos la vista por primera vez
        renderUI();
    </script>
</body>
</html>
